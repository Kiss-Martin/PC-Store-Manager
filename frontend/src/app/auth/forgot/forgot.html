<div class="forgot-container">
  <div class="forgot-wrapper">
    <div class="forgot-header">
      <div class="logo-section">
        <lucide-icon name="monitor" class="logo" size="32"></lucide-icon>
        <span class="brand">PC Store</span>
        <button type="button" class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="'login.themeAria' | t">
          <lucide-icon [name]="theme.isDark() ? 'sun' : 'moon'" size="16"></lucide-icon>
          <span class="ml-8">{{ theme.isDark() ? ('app.theme.light' | t) : ('app.theme.dark' | t) }}</span>
        </button>
        <button type="button" class="theme-toggle" (click)="toggleLanguage()" [attr.aria-label]="'app.lang.aria' | t">
          {{ 'app.lang.toggle' | t }}
        </button>
      </div>
      <h1 class="forgot-title">{{ 'forgot.title' | t }}</h1>
      <p class="forgot-subtitle">{{ 'forgot.subtitle' | t }}</p>
    </div>

    <div class="forgot-card">
      @if (message) {
        <div class="status-message" [class.success-message]="sent" [class.error-message]="!sent">
          <p class="status-text">{{ message }}</p>
        </div>
      }

      <form (ngSubmit)="sendReset()" class="form">
        <div class="form-group">
          <label for="email" class="form-label">{{ 'forgot.email' | t }}</label>
          <input
            id="email"
            name="email"
            type="email"
            [(ngModel)]="email"
            required
            [placeholder]="'forgot.emailPlaceholder' | t"
            class="form-input"
          />
        </div>

        <button type="submit" [disabled]="isLoading || sent" class="submit-button">
          {{ isLoading ? ('forgot.sending' | t) : (sent ? ('forgot.sent' | t) : ('forgot.sendResetLink' | t)) }}
        </button>
      </form>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">{{ 'login.or' | t }}</span>
        <div class="divider-line"></div>
      </div>

      <button type="button" (click)="goToLogin()" class="secondary-button">
        {{ 'forgot.backToLogin' | t }}
      </button>
    </div>

    <div class="footer">
      <p class="footer-text">
        {{ 'forgot.remembered' | t }} <button type="button" (click)="goToLogin()" class="footer-link">{{ 'register.signIn' | t }}</button>
      </p>
    </div>
  </div>
</div>
