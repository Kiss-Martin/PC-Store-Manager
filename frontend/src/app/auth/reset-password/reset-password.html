<div class="reset-container">
  <div class="reset-wrapper">
    <div class="reset-header">
      <div class="logo-section">
        <lucide-icon name="monitor" class="logo" size="32"></lucide-icon>
        <span class="brand">PC Store</span>
        <button type="button" class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="'login.themeAria' | t">
          <lucide-icon [name]="theme.isDark() ? 'sun' : 'moon'" size="16"></lucide-icon>
          <span class="ml-8">{{ theme.isDark() ? ('app.theme.light' | t) : ('app.theme.dark' | t) }}</span>
        </button>
        <button type="button" class="theme-toggle" (click)="toggleLanguage()" [attr.aria-label]="'app.lang.aria' | t">
          {{ 'app.lang.toggle' | t }}
        </button>
      </div>
      <h1 class="reset-title">{{ 'resetPassword.title' | t }}</h1>
      <p class="reset-subtitle">{{ 'resetPassword.subtitle' | t }}</p>
    </div>

    @if (success) {
      <div class="reset-card success-card">
        <lucide-icon name="check-circle" size="48" class="success-icon"></lucide-icon>
        <p class="success-text">{{ 'resetPassword.success' | t }}</p>
        <p class="success-redirect">{{ 'resetPassword.redirecting' | t }}</p>
      </div>
    } @else {
      <div class="reset-card">
        @if (error) {
          <div class="error-banner">
            <p class="error-text">{{ error }}</p>
          </div>
        }

        <form (ngSubmit)="submit()" class="form">
          <div class="form-group">
            <label class="form-label">{{ 'resetPassword.newPassword' | t }}</label>
            <input
              type="password"
              [(ngModel)]="newPassword"
              name="newPassword"
              [placeholder]="'resetPassword.newPasswordPlaceholder' | t"
              class="form-input"
            />
          </div>

          <div class="form-group">
            <label class="form-label">{{ 'resetPassword.confirmPassword' | t }}</label>
            <input
              type="password"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              [placeholder]="'resetPassword.confirmPasswordPlaceholder' | t"
              class="form-input"
            />
          </div>

          <button type="submit" [disabled]="isLoading || !token" class="submit-button">
            {{ isLoading ? ('resetPassword.resetting' | t) : ('resetPassword.resetButton' | t) }}
          </button>
        </form>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">{{ 'login.or' | t }}</span>
          <div class="divider-line"></div>
        </div>

        <button type="button" (click)="goToLogin()" class="secondary-button">
          {{ 'forgot.backToLogin' | t }}
        </button>
      </div>
    }
  </div>
</div>
