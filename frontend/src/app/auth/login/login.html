<div class="login-container">
  <div class="login-wrapper">
    <!-- Logo/Header -->
    <div class="login-header">
      <div class="logo-section">
        <lucide-icon name="monitor" class="logo" size="32"></lucide-icon>
        <span class="brand">PC Store</span>
        <button type="button" class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="'login.themeAria' | t">
          <lucide-icon [name]="theme.isDark() ? 'sun' : 'moon'" size="16"></lucide-icon>
          <span class="ml-8">{{ theme.isDark() ? ('app.theme.light' | t) : ('app.theme.dark' | t) }}</span>
        </button>
        <button type="button" class="theme-toggle" (click)="toggleLanguage()" [attr.aria-label]="'app.lang.aria' | t">
          {{ 'app.lang.toggle' | t }}
        </button>
      </div>
      <h1 class="login-title">{{ 'login.title' | t }}</h1>
      <p class="login-subtitle">{{ 'login.subtitle' | t }}</p>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <!-- Form -->
      <form (ngSubmit)="login()" class="form">
        <!-- Email -->
        <div class="form-group">
          <label class="form-label">{{ 'login.email' | t }}</label>
          <input
            type="text"
            [(ngModel)]="email"
            name="email"
            [placeholder]="'login.emailPlaceholder' | t"
            class="form-input"
            />
          </div>

          <!-- Password -->
          <div class="form-group">
            <label class="form-label">{{ 'login.password' | t }}</label>
            <input
              type="password"
              [(ngModel)]="password"
              name="password"
              [placeholder]="'login.passwordPlaceholder' | t"
              class="form-input"
              />
            </div>

            <!-- Remember me -->
            <div class="form-group remember">
              <label class="checkbox-label">
                <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
                <span>{{ 'login.staySignedIn' | t }}</span>
              </label>
            </div>

            <div class="form-row">
              <button type="button" (click)="goToForgot()" class="forgot-button">{{ 'login.forgotPassword' | t }}</button>
            </div>

            <!-- Login Button -->
            <button
              type="submit"
              [disabled]="isLoading"
              class="login-button"
              >
              {{ isLoading ? ('login.signingIn' | t) : ('login.signIn' | t) }}
            </button>
          </form>

          <!-- Divider -->
          <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">{{ 'login.or' | t }}</span>
            <div class="divider-line"></div>
          </div>

          <!-- Register Link -->
          <button
            (click)="goToRegister()"
            class="register-button"
            >
            {{ 'login.createAccount' | t }}
          </button>
        </div>

        <!-- Footer -->
        <div class="footer">
          <p class="footer-text">
            {{ 'login.needHelp' | t }} <button type="button" class="footer-link" (click)="openContactModal()">{{ 'login.contactSupport' | t }}</button>
          </p>
        </div>
      </div>
    </div>

    <!-- Contact Support Modal -->
    @if (showContactModal) {
      <div class="modal-backdrop" (click)="closeContactModal()" role="dialog" aria-modal="true">
        <div class="modal-card" (click)="$event.stopPropagation()">
          <div class="modal-header">
            <h2 class="modal-title">{{ 'login.contactModal.title' | t }}</h2>
            <button type="button" class="modal-close" (click)="closeContactModal()" aria-label="Close">
              <lucide-icon name="x" size="18"></lucide-icon>
            </button>
          </div>
          <p class="modal-subtitle">{{ 'login.contactModal.subtitle' | t }}</p>
          <form (ngSubmit)="submitContactSupport()" class="modal-form">
            <div class="form-group">
              <label class="form-label">{{ 'login.contactModal.name' | t }}</label>
              <input type="text" [(ngModel)]="contactName" name="contactName"
                [placeholder]="'login.contactModal.namePlaceholder' | t" class="form-input" />
            </div>
            <div class="form-group">
              <label class="form-label">{{ 'login.contactModal.email' | t }}</label>
              <input type="email" [(ngModel)]="contactEmail" name="contactEmail"
                [placeholder]="'login.contactModal.emailPlaceholder' | t" class="form-input" />
            </div>
            <div class="form-group">
              <label class="form-label">{{ 'login.contactModal.message' | t }}</label>
              <textarea [(ngModel)]="contactMessage" name="contactMessage" rows="4"
                [placeholder]="'login.contactModal.messagePlaceholder' | t"
                class="form-input contact-textarea" required></textarea>
            </div>
            <div class="modal-actions">
              <button type="button" class="modal-btn-cancel" (click)="closeContactModal()" [disabled]="contactLoading">
                {{ 'login.contactModal.cancel' | t }}
              </button>
              <button type="submit" class="modal-btn-send" [disabled]="contactLoading">
                {{ contactLoading ? ('login.contactModal.sending' | t) : ('login.contactModal.send' | t) }}
              </button>
            </div>
          </form>
        </div>
      </div>
    }
