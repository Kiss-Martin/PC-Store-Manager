@if (show) {
  <div class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-1000 animate-fade-in" (click)="onCancel()">
    <div class="rounded-2xl p-8 w-full max-w-sm text-center animate-slide-up" [style.background]="'var(--color-card)'" (click)="$event.stopPropagation()">
      <div class="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-5"
        [class]="confirmColor === 'danger' ? 'bg-red-500/10 text-red-500' : 'bg-violet-600/10 text-violet-600'">
        <lucide-icon [name]="icon" size="32"></lucide-icon>
      </div>

      <div class="mb-6">
        <h2 class="text-xl font-bold mb-2" [style.color]="'var(--color-text)'">{{ resolvedTitle }}</h2>
        <p class="text-sm" [style.color]="'var(--color-muted)'">{{ resolvedMessage }}</p>
      </div>

      <div class="flex gap-3 justify-center">
        <button class="px-6 py-2.5 rounded-lg border-2 font-medium cursor-pointer transition-colors bg-transparent hover:bg-gray-100" [style.color]="'var(--color-text)'" [style.border-color]="'var(--color-card-border)'" (click)="onCancel()">
          {{ resolvedCancelText }}
        </button>
        <button
          class="px-6 py-2.5 rounded-lg border-none text-white font-medium cursor-pointer transition-colors"
          [class]="confirmColor === 'danger' ? 'bg-red-500 hover:bg-red-600' : 'bg-violet-600 hover:bg-violet-700'"
          (click)="onConfirm()">
          {{ resolvedConfirmText }}
        </button>
      </div>
    </div>
  </div>
}
