version: "1"
projects:
- name: My project
  environments:
  - name: Production
    services:
    - type: web
      name: PC-Store-Manager-Backend
      runtime: node
      repo: https://github.com/Kiss-Martin/PC-Store-Manager
      buildCommand: npm install
      startCommand: npm start
      autoDeployTrigger: commit
      rootDir: backend
      envVars:
      - key: NODE_ENV
