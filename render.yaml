      name: PC-Store-Manager-Frontend
      runtime: static
      repo: https://github.com/Kiss-Martin/PC-Store-Manager
      buildCommand: npm install && npm run build
      staticPublishPath: dist/frontend/browser
      autoDeployTrigger: commit
      rootDir: frontend
